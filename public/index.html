<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Webpoint Shipyard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0F1E;--glass:rgba(16,24,48,.55);--line:rgba(74,158,255,.18);--accent:#4A9EFF;--gold:#FFD700;--text:#E8EDF7;--muted:#8A97B0}
*{box-sizing:border-box;margin:0}body{background:var(--ink);color:var(--text);font:400 15px/1.6 'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(900px 500px at 70% -10%,rgba(74,158,255,.08),transparent 60%)}
.card{background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:34px 38px;max-width:560px;width:92%;backdrop-filter:blur(10px)}
h1{font-size:20px;font-weight:500;letter-spacing:.04em}h1 span{color:var(--gold)}
.sub{color:var(--muted);font-size:13px;margin:6px 0 22px}
a.tool{display:block;border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin:10px 0;color:var(--accent);text-decoration:none;font-size:14px;text-shadow:0 0 12px rgba(74,158,255,.45)}
a.tool:hover{background:rgba(74,158,255,.1)}
.empty{color:var(--muted);font-size:13px;border:1px dashed var(--line);border-radius:10px;padding:14px 16px}
footer{margin-top:22px;color:var(--muted);font-size:11.5px}
</style></head><body>
<div class="card">
<h1><span>&#10022;</span> WEBPOINT SHIPYARD</h1>
<div class="sub">push to main &rarr; live in ~30 seconds &middot; every file in /public is a URL</div>
<a class="tool" href="./proof.html">proof.html &mdash; deploy lane verification</a>
<div class="empty">Next tool ships by adding one file to /public. That is the entire process.</div>
<footer>Prototype tier &middot; Render free static &middot; autoDeploy on</footer>
</div></body></html>
